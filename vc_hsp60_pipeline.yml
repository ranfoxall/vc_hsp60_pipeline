name: vc_hsp60_pipeline
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # Core
  - r-base=4.3
  - r-essentials

  # R packages
  - r-dada2
  - r-shortread
  - r-dplyr
  - r-magrittr
  - r-tidyr
  - r-ggplot2
  - r-phyloseq
  - r-optparse

  # System dependencies for R packages
  - zlib
  - bzip2
  - xz
  - libxml2
  - cmake
  - make
  - gcc_linux-64  # use gcc_osx-arm64 on mac M1/2

  # Utilities
  - wget
  - curl
  - git

